sonar.projectKey=lextpf_wild
sonar.organization=lextpf

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# C/C++ analysis via Build Wrapper
sonar.cfamily.build-wrapper-output=bw-output

# Skip coverage analysis (no coverage data collected)
sonar.coverage.exclusions=**/*

# Skip duplication checks on dialogue data tables (struct-initializer repetition, not logic)
sonar.cpd.exclusions=**/Dialogues.cpp
