name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vulkan SDK
        run: |
          $ver = "1.3.283.0"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath .\VulkanSDK.exe -Args "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$ver\Bin" >> $env:GITHUB_PATH

      - name: Create asset directories
        run: |
          New-Item -ItemType Directory -Path assets -Force
          New-Item -ItemType Directory -Path shaders -Force

      - name: Run clang-format
        run: |
          Get-ChildItem -Path src -Include *.cpp,*.h,*.hpp -Recurse | ForEach-Object {
            clang-format -i $_.FullName
          }
          $diff = git diff --name-only
          if ($diff) {
            Write-Host "::error::clang-format found formatting issues in: $diff"
            git diff
            exit 1
          }
          Write-Host "All source files are properly formatted."

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Stage build artifacts
        shell: pwsh
        run: |
          $staging = "artifact-staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null

          $bin = "build\Release"
          if (-not (Test-Path "$bin\rift.exe")) {
            Write-Error "rift.exe not found - the build step did not produce a binary."
            exit 1
          }

          # Executable + runtime DLLs (vcpkg copies these next to the .exe).
          Copy-Item "$bin\*.exe" $staging
          Get-ChildItem -Path $bin -Filter *.dll -File -ErrorAction SilentlyContinue |
            Copy-Item -Destination $staging

          # Compiled shaders (SPIR-V) + GLSL source - both are needed at runtime
          # by the Vulkan / OpenGL backends respectively, and are small.
          if (Test-Path "$bin\shaders") {
            Copy-Item -Path "$bin\shaders" -Destination $staging -Recurse
          }

          # Project manifest - tiny config file the executable expects next to it.
          if (Test-Path "$bin\rift.project.json") {
            Copy-Item "$bin\rift.project.json" $staging
          }

          Write-Host "Staged contents:"
          Get-ChildItem -Path $staging -Recurse -File |
            ForEach-Object {
              "{0,12:N0}  {1}" -f $_.Length, ($_.FullName.Substring((Resolve-Path $staging).Path.Length + 1))
            }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rift-windows-x64-${{ github.sha }}
          path: artifact-staging/
          if-no-files-found: error
          retention-days: 14
